name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['version-bump/**']

jobs:
  test:
    runs-on: ubuntu-latest
    if: "github.actor != 'github-actions[bot]'"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const start = html.indexOf('<script>') + 8;
            const end = html.indexOf('</script>');
            fs.writeFileSync('/tmp/_ci_script.js', html.slice(start, end));
          "
          node --check /tmp/_ci_script.js
          for f in tab-*.js; do [ -f "$f" ] && node --check "$f" && echo "$f OK"; done

      - name: Frontend tests
        run: node tests/test_frontend.js index.html
