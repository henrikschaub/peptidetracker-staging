name: Version Bump

on:
  push:
    branches: [main]

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "github.actor != 'github-actions[bot]'"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version and push to main
        run: |
          CURRENT=$(jq -r '.version' version.json)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW="${MAJOR}.$((MINOR + 1))"

          echo "{\"version\": \"${NEW}\"}" > version.json
          sed -i "s/const VERSION='[0-9.]*'/const VERSION='${NEW}'/" index.html

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json index.html
          git commit -m "chore: bump to v${NEW}"
          git push origin HEAD:main
