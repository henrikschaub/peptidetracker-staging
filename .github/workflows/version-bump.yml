name: Version Bump

on:
  push:
    branches: [main]

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "github.actor != 'github-actions[bot]'"
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          CURRENT=$(jq -r '.version' version.json)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW="${MAJOR}.$((MINOR + 1))"

          echo "{\"version\": \"${NEW}\"}" > version.json
          sed -i "s/const VERSION='[0-9.]*'/const VERSION='${NEW}'/" index.html

          echo "NEW=${NEW}" >> $GITHUB_ENV

      - name: Commit and push branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="version-bump/v${NEW}"
          git push origin --delete "$BRANCH" || true
          git checkout -b "$BRANCH"
          git add version.json index.html
          git commit -m "chore: bump to v${NEW}"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump to v${NEW}" \
            --body "Auto-generated version bump. Merges automatically once CI passes.")
          gh pr merge --auto --squash "$PR_URL"

      - name: Approve blocked CI run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub suppresses workflow triggers from GITHUB_TOKEN pushes, so the
          # pull_request CI run lands in action_required. Poll until it appears,
          # then approve it so CI records "skipped" and auto-merge can fire.
          # Filter by head_branch in jq (not URL param) to avoid %2F encoding issues.
          for i in $(seq 1 12); do
            RUN_ID=$(gh api "repos/${{ github.repository }}/actions/runs?event=pull_request&per_page=20" \
              --jq "[.workflow_runs[] | select(.head_branch == \"$BRANCH\" and .status == \"action_required\")] | .[0].id")
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              gh api -X POST "repos/${{ github.repository }}/actions/runs/$RUN_ID/approve"
              echo "Approved CI run $RUN_ID after $i attempts"
              exit 0
            fi
            echo "Attempt $i: no action_required run yet, waiting 5s..."
            sleep 5
          done
          echo "CI run did not appear in action_required within 60s — may have already passed"
