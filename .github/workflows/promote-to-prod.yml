name: Promote to prod

on:
  repository_dispatch:
    types: [promote]

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          path: staging

      - name: Checkout prod
        uses: actions/checkout@v4
        with:
          repository: henrikschaub/peptidetracker
          token: ${{ secrets.PROMOTE_TOKEN }}
          path: prod

      - name: Sync files into prod branch
        run: |
          cd prod
          git config user.name "staging-promote-bot"
          git config user.email "actions@github.com"
          BRANCH="promote/staging-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          git checkout -b "$BRANCH"

          # Copy index.html from staging
          cp ../staging/index.html ./index.html

          # Copy tab JS files from staging
          for f in ../staging/tab-*.js; do
            [ -f "$f" ] && cp "$f" ./
          done

          # Copy CI workflow and test suite — they must stay in sync with the code
          # (version-bump.yml, promote-to-prod.yml, version.json, CLAUDE.md are prod-owned)
          cp ../staging/.github/workflows/ci.yml .github/workflows/ci.yml
          cp -r ../staging/tests .

          # Reset VERSION and ?v= cache-bust strings to prod's current version so
          # const VERSION, version.json, and tab script src tags all stay in sync
          # (staging has its own independent version counter)
          PROD_VERSION=$(jq -r '.version' version.json)
          sed -i "s/const VERSION='[0-9.]*'/const VERSION='${PROD_VERSION}'/" index.html
          sed -i "s/\.js?v=[0-9.]*/.js?v=${PROD_VERSION}/g" index.html

          if git diff --quiet && git diff --staged --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No changes to promote"
            exit 0
          fi

          git add -A
          git commit -m "Promote staging changes (${GITHUB_SHA::7})"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open PR on prod
        if: env.BRANCH != ''
        env:
          GH_TOKEN: ${{ secrets.PROMOTE_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/henrikschaub/peptidetracker/pulls \
            -d "{\"title\":\"Promote staging changes (${GITHUB_SHA::7})\",\"head\":\"$BRANCH\",\"base\":\"main\",\"body\":\"Auto-generated PR from peptidetracker-staging@main (${GITHUB_SHA}), triggered via Push to Prod.\"}")
          PR_URL=$(echo "$RESPONSE" | jq -r '.html_url')
          PR_NODE_ID=$(echo "$RESPONSE" | jq -r '.node_id')
          PR_NUMBER=$(echo "$RESPONSE" | jq -r '.number')
          if [ "$PR_URL" = "null" ] || [ -z "$PR_URL" ]; then
            echo "PR creation failed: $RESPONSE"
            exit 1
          fi
          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"
          echo "PR_NODE_ID=$PR_NODE_ID" >> "$GITHUB_ENV"
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"

      - name: Enable auto-merge on the PR
        if: env.PR_NODE_ID != ''
        env:
          GH_TOKEN: ${{ secrets.PROMOTE_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/graphql \
            -d "{\"query\":\"mutation { enablePullRequestAutoMerge(input: {pullRequestId: \\\"$PR_NODE_ID\\\", mergeMethod: SQUASH}) { pullRequest { autoMergeRequest { mergeMethod } } } }\"}"

      - name: Wait for prod PR to merge
        if: env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.PROMOTE_TOKEN }}
        run: |
          echo "Waiting for PR #$PR_NUMBER to merge on peptidetracker..."
          for i in $(seq 1 60); do
            RESULT=$(gh api repos/henrikschaub/peptidetracker/pulls/$PR_NUMBER \
              --jq '{state: .state, merged: .merged}')
            STATE=$(echo "$RESULT" | jq -r '.state')
            MERGED=$(echo "$RESULT" | jq -r '.merged')
            if [ "$MERGED" = "true" ]; then
              echo "PR #$PR_NUMBER merged (attempt $i)"
              exit 0
            elif [ "$STATE" = "closed" ]; then
              echo "PR #$PR_NUMBER closed without merging — CI failed on prod"
              exit 1
            fi
            echo "Attempt $i: state=$STATE, waiting 10s..."
            sleep 10
          done
          echo "Timeout: PR #$PR_NUMBER did not merge within 10 minutes"
          exit 1
